# Starship config: p10k-lean inspired, two-line, transient-friendly.
# Refs: https://starship.rs/config/

add_newline = true
command_timeout = 1500

# Two-line prompt: info on top, character on bottom.
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$conda\
$cmd_duration
$character """


[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[username]
style_user  = "bold yellow"
style_root  = "bold red"
format      = "[$user]($style)"
show_always = false

[hostname]
ssh_only = true
format   = "[@$hostname]($style) "
style    = "bold green"

[directory]
truncation_length = 4
truncate_to_repo  = false
style             = "bold blue"
format            = "[$path]($style)[$read_only]($read_only_style) "
read_only         = " "

[git_branch]
symbol = " "
style  = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style) )"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "="
deleted    = "✘"
modified   = "!"
renamed    = "»"
staged     = "+"
untracked  = "?"
stashed    = "≡"

[python]
symbol            = " "
style             = "bold yellow"
format            = '[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style) '
detect_extensions = []   # don't fire on stray .py files
detect_files      = ["pyproject.toml", "uv.lock"]

[conda]
symbol      = " "
style       = "bold green"
format      = "[$symbol$environment]($style) "
ignore_base = true

[cmd_duration]
min_time = 2000
style    = "bold yellow"
format   = "took [$duration]($style) "

[jobs]
symbol = "+"
format = "[$symbol$number]($style) "
style  = "bold blue"

[time]
disabled = false
format   = "[$time]($style)"
style    = "dim white"
time_format = "%H:%M"

# Disable noisy/irrelevant modules globally
[aws]
disabled = true
[gcloud]
disabled = true
[nodejs]
disabled = true
[package]
disabled = true
[rust]
disabled = true
[golang]
disabled = true
[java]
disabled = true
[ruby]
disabled = true