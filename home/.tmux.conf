# ============================================================================
# ~/.tmux.conf — symlinked from dotfiles
# Designed to be sane on shared servers. No external plugins required.
# ============================================================================

# ─── prefix: Ctrl-a (easier than Ctrl-b, doesn't conflict with vim Ctrl-b) ──
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── general ──────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on
set -g status-keys vi
setw -g mode-keys vi

# ─── splits + navigation (vim-like) ────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "config reloaded"

# Quick window switching
bind -n C-Left  previous-window
bind -n C-Right next-window

# ─── copy mode (vim bindings) ──────────────────────────────────────────────
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ─── status bar ────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=white"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left  "#[fg=cyan,bold] #S #[default]"
set -g status-right "#[fg=yellow]#H #[fg=white]| #[fg=green]%H:%M %d-%b "

setw -g window-status-current-style "fg=black,bg=cyan,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format         " #I:#W "

# ─── pane borders ──────────────────────────────────────────────────────────
set -g pane-border-style        "fg=brightblack"
set -g pane-active-border-style "fg=cyan"
